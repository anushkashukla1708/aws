function validateForm() {
    
    const salaryInput = parseFloat(document.getElementById("n4").value); // Use parseFloat for numbers
    const resumeInput = document.getElementById("n8");
    
    const minSalary = 50000;
    const maxSalary = 500000;
    const maxResumeSizeMB = 2;

    if (isNaN(salaryInput) || salaryInput < minSalary || salaryInput > maxSalary) {
        alert("Salary must be between $" + minSalary + " and $" + maxSalary + ".");
        return false;
    }

    if (resumeInput.files.length > 0) {
        const file = resumeInput.files[0];
        const fileSizeMB = file.size / (1024 * 1024); 

        if (fileSizeMB > maxResumeSizeMB) { 
            alert("The resume file size (" + fileSizeMB.toFixed(2) + "MB) exceeds the maximum allowed size of " + maxResumeSizeMB + "MB. Please upload a smaller file.");
            return false;
        }
        
    }

    
    return true;
}
